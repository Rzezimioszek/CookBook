<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Moje Przepisy</title>
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <a href="index.html"><h1 id="siteTitle">CookBook</h1></a>
  </header>

  <main>
    <!-- Side Panel -->
    <aside id="sidePanel">
      <input type="text" id="search" placeholder="Wyszukaj przepis...">
      <div id="recipeList"></div>
    </aside>

    <!-- Content Area -->
    <div id="contentArea">
      <div id="suggestedRecipes" class="suggestedRecipes"></div>
      
      <div id="previewPanel">
        <h1 id="recipeTitle"></h1>
        <div id="preview"></div>
        
        <!-- Recipe Actions -->
        <div class="recipe-actions">
          <button id="exportPdfBtn" title="Drukuj / PDF" style="display:none">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          </button>
          <button id="copyTextBtn" title="Kopiuj tekst" style="display:none">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
          <button id="copyLinkBtn" title="Kopiuj link" style="display:none">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.1 0l1.4-1.4a5 5 0 1 0-7.1-7.1L10 5"/><path d="M14 11a5 5 0 0 0-7.1 0l-1.4 1.4a5 5 0 0 0 7.1 7.1L14 19"/></svg>
          </button>
          <button id="addFav" title="Ulubione" style="display:none">
            <span id="favIcon"></span>
          </button>
          <button id="installBtn" style="display: none;">Zainstaluj</button>
        </div>
      </div>
    </div>
  
    <!-- Bottom Dock -->
    <div id="bottomDock">
      <button id="tabIngredientsBtn" class="tab-btn-dock" style="display: none;" title="Składniki">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        <span style="font-size: 10px; display: block;">Składniki</span>
      </button>
      <button id="tabPreparationBtn" class="tab-btn-dock" style="display: none;" title="Przygotowanie">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        <span style="font-size: 10px; display: block;">Przepis</span>
      </button>

      <div class="dock-separator" style="width: 1px; height: 24px; background: rgba(0,0,0,0.1); margin: 0 5px; display: none;"></div>

      <button id="favoritesBtn" title="Ulubione">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41 0.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      </button>
      <button id="burgerBtn" title="Menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>

    <!-- Drawers -->
    <div id="drawerRecent" class="drawer">
      <h3>Ostatnio oglądane</h3>
      <div id="recentRecipes"></div>
    </div>

    <div id="drawerFavorites" class="drawer">
      <h3>Ulubione przepisy</h3>
      <div id="favoriteRecipes"></div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
